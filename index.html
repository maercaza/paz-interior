<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAZ INTERIOR — Tienda Esotérica Mayorista | Ecuador</title>
<meta name="description" content="PAZ INTERIOR: Proveedor mayorista de inciensos, velas, jabones espirituales, colonias, riegos, perfumes esotéricos y sahumerios en Ecuador.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --obsidian:#1A1A1A;--obsidian2:#111111;--obsidian3:#0D0D0D;
  --surface:#1F1F1F;--surface2:#252525;--surface3:#2A2A2A;
  --gold:#C5A059;--gold-l:#D4B574;--gold-d:#A8863E;--gold-dim:#8B7240;
  --linen:#F9F8F5;--linen2:#E8E4DB;--gray:#948D87;--gray2:#7A736E;
  --green:#25d366;
  --ff-h:'Cormorant Garamond',serif;--ff-b:'Montserrat',sans-serif;
  --max-w:1300px;--ease:cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--ff-b);background:var(--obsidian);color:var(--linen);overflow-x:hidden;font-size:16px;line-height:1.9;font-weight:300}
a{text-decoration:none;color:inherit}ul{list-style:none}
::selection{background:var(--gold);color:var(--obsidian)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--obsidian)}::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px}

/* ═══ GRAIN OVERLAY ═══ */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ═══ SMOKE CANVAS ═══ */
#smoke-canvas{position:fixed;inset:0;pointer-events:none;z-index:1}

/* ═══ NAVBAR — FROSTED DARK GLASS ═══ */
.navbar{position:fixed;top:0;left:0;width:100%;z-index:9999;padding:1.4rem 3.5rem;display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,13,13,.55);backdrop-filter:blur(24px) saturate(120%);-webkit-backdrop-filter:blur(24px) saturate(120%);
  border-bottom:1px solid rgba(197,160,89,.06);transition:all .5s var(--ease)}
.navbar.scrolled{padding:1rem 3.5rem;background:rgba(13,13,13,.8);border-bottom-color:rgba(197,160,89,.1)}
.nav-logo{font-family:var(--ff-h);font-size:1.4rem;font-weight:500;letter-spacing:5px;text-transform:uppercase}
.nav-logo span:first-child{color:var(--linen)}.nav-logo span:last-child{color:var(--gold)}
.nav-links{display:flex;gap:2.5rem;align-items:center}
.nav-links a{font-family:var(--ff-b);font-size:.65rem;font-weight:400;letter-spacing:3.5px;text-transform:uppercase;color:var(--gray);
  position:relative;transition:all .5s var(--ease);transform-style:preserve-3d;perspective:500px;padding:.8rem .5rem;overflow:hidden}
.nav-links a::before{content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .5s var(--ease);transform-origin:right}
.nav-links a::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(249,248,245,.04) 0%,transparent 70%);opacity:0;transition:opacity .5s;pointer-events:none}
.nav-links a:hover{color:var(--gold);transform:translateZ(10px) translateY(-1px)}
.nav-links a:hover::before{transform:scaleX(1);transform-origin:left}
.nav-links a:hover::after{opacity:1}
.hamburger{display:none;flex-direction:column;gap:6px;cursor:pointer;z-index:10001}
.hamburger span{width:24px;height:1px;background:var(--gold);transition:all .3s}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(4px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(4px,-5px)}

/* ═══ METALLIC GOLD TEXT ═══ */
.gold-metal{background:linear-gradient(135deg,var(--gold-d) 0%,var(--gold-l) 25%,var(--gold) 50%,var(--gold-l) 75%,var(--gold-d) 100%);
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite}
@keyframes shimmer{to{background-position:200% center}}

/* ═══ PAGES ═══ */
#app{min-height:100vh;position:relative;z-index:2}
.page-enter{animation:fadeUp .8s var(--ease) forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(35px)}to{opacity:1;transform:translateY(0)}}

/* ═══ HERO ═══ */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.35;filter:contrast(1.3) saturate(.4)}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(26,26,26,.3) 0%,rgba(26,26,26,.85) 70%,var(--obsidian) 100%)}
.hero-content{position:relative;z-index:2;max-width:750px;padding:2rem}
.hero-line{width:1px;height:70px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin:0 auto 2.5rem;opacity:0;animation:hIn 1s var(--ease) forwards .3s}
.hero-label{font-family:var(--ff-b);font-size:.6rem;font-weight:300;letter-spacing:10px;color:var(--gold-dim);text-transform:uppercase;opacity:0;animation:hIn 1s var(--ease) forwards .5s}
.hero-title{font-family:var(--ff-h);font-size:clamp(3.2rem,8vw,6.5rem);font-weight:300;line-height:.95;margin:1.2rem 0;opacity:0;animation:hIn 1s var(--ease) forwards .8s}
.hero-sub{font-family:var(--ff-b);font-size:.7rem;font-weight:200;letter-spacing:10px;color:var(--gray);text-transform:uppercase;opacity:0;animation:hIn 1s var(--ease) forwards 1.1s}
.hero-tagline{font-family:var(--ff-h);font-size:clamp(1.1rem,2vw,1.4rem);font-weight:300;font-style:italic;color:var(--gray);margin-top:3rem;opacity:0;animation:hIn 1s var(--ease) forwards 1.4s}
.hero-cta{display:inline-block;margin-top:3.5rem;padding:1.1rem 4rem;font-family:var(--ff-b);font-size:.65rem;font-weight:400;letter-spacing:5px;text-transform:uppercase;
  color:var(--obsidian);background:linear-gradient(135deg,var(--gold-d),var(--gold-l),var(--gold));background-size:200% auto;
  border:none;cursor:pointer;transition:all .5s var(--ease);position:relative;overflow:hidden;opacity:0;animation:hIn 1s var(--ease) forwards 1.7s}
.hero-cta:hover{background-position:right center;box-shadow:0 0 40px rgba(197,160,89,.2),0 10px 30px rgba(0,0,0,.4);transform:translateY(-2px)}
@keyframes hIn{to{opacity:1;transform:translateY(0)}}
.hero-line,.hero-label,.hero-title,.hero-sub,.hero-tagline,.hero-cta{transform:translateY(20px)}
.hero-scroll{position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.6rem;opacity:0;animation:hIn 1s var(--ease) forwards 2s}
.hero-scroll span{font-family:var(--ff-b);font-size:.5rem;font-weight:300;letter-spacing:6px;color:var(--gold-dim);text-transform:uppercase}
.scroll-ln{width:1px;height:35px;background:linear-gradient(to bottom,var(--gold-d),transparent);animation:sA 2.5s ease-in-out infinite}
@keyframes sA{0%,100%{opacity:.2;transform:scaleY(.4)}50%{opacity:.6;transform:scaleY(1)}}

/* ═══ GOLD BAND ═══ */
.ann-band{background:linear-gradient(90deg,var(--gold-d),var(--gold),var(--gold-d));color:var(--obsidian);text-align:center;padding:.85rem 2rem;font-family:var(--ff-b);font-size:.6rem;letter-spacing:4px;font-weight:500;text-transform:uppercase}

/* ═══ SECTIONS ═══ */
.section{padding:9rem 3rem;position:relative}.section-inner{max-width:var(--max-w);margin:0 auto}
.section-header{text-align:center;margin-bottom:5rem}
.section-label{font-family:var(--ff-b);font-size:.55rem;font-weight:300;letter-spacing:8px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:1.2rem}
.section-title{font-family:var(--ff-h);font-size:clamp(2rem,4.5vw,3rem);font-weight:400;letter-spacing:2px}
.section-sub{font-family:var(--ff-h);font-size:1.1rem;font-weight:300;font-style:italic;color:var(--gray);margin-top:1rem}
.gold-ln{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:2rem auto 0}

/* ═══ INTRO ═══ */
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;max-width:1100px;margin:0 auto}
.intro-img{position:relative;overflow:hidden;aspect-ratio:4/3}
.intro-img img{width:100%;height:100%;object-fit:cover;filter:contrast(1.2) saturate(.35);transition:transform .6s var(--ease)}
.intro-img:hover img{transform:scale(1.03)}
.intro-img::after{content:'';position:absolute;inset:0;border:1px solid rgba(197,160,89,.1)}
.intro-text p{font-size:1.05rem;color:var(--gray);line-height:2.2;font-weight:300}
.intro-text strong{color:var(--gold);font-weight:400}
.intro-text .intro-label{font-family:var(--ff-b);font-size:.55rem;font-weight:300;letter-spacing:8px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:1rem;display:block}
.intro-text h2{font-family:var(--ff-h);font-size:clamp(1.6rem,3vw,2.2rem);font-weight:400;margin-bottom:2rem}

/* ═══ PRODUCT GRID ═══ */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:rgba(197,160,89,.04)}
.prod-card{background:var(--obsidian);padding:3.5rem 2.5rem;text-align:center;position:relative;overflow:hidden;transition:all .6s var(--ease);cursor:pointer;display:block}
.prod-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center bottom,rgba(197,160,89,.04) 0%,transparent 70%);opacity:0;transition:opacity .6s}
.prod-card:hover{background:var(--surface)}
.prod-card:hover::before{opacity:1}
.prod-icon{margin-bottom:1.5rem;width:120px;height:120px;margin-left:auto;margin-right:auto;overflow:hidden;border-radius:50%;border:1px solid rgba(197,160,89,.08);transition:all .6s var(--ease)}
.prod-icon img{width:100%;height:100%;object-fit:cover;filter:contrast(1.1) saturate(.7);transition:all .6s var(--ease)}
.prod-card:hover .prod-icon{border-color:rgba(197,160,89,.2);box-shadow:0 0 30px rgba(197,160,89,.1)}
.prod-card:hover .prod-icon img{transform:scale(1.08);filter:contrast(1.15) saturate(.8)}
.prod-name{font-family:var(--ff-h);font-size:1.2rem;font-weight:500;color:var(--linen);letter-spacing:2px;margin-bottom:1rem}
.prod-desc{font-size:.8rem;color:var(--gray);margin-bottom:1.8rem;line-height:1.9;font-weight:300}
.prod-price{font-family:var(--ff-h);font-size:1.6rem;font-weight:600}
.prod-price small{font-size:.6rem;color:var(--gray);font-weight:300;display:block;margin-top:.4rem;letter-spacing:2px;font-family:var(--ff-b)}
.prod-link{display:inline-block;margin-top:1.5rem;font-family:var(--ff-b);font-size:.55rem;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dim);transition:all .3s;border-bottom:1px solid rgba(197,160,89,.1);padding-bottom:3px}
.prod-link:hover{color:var(--gold);border-color:var(--gold)}

/* ═══ INCENSE SECTION ═══ */
.inc-banner{position:relative;overflow:hidden;margin-bottom:5rem;aspect-ratio:21/6}
.inc-banner img{width:100%;height:100%;object-fit:cover;filter:contrast(1.2) saturate(.3);opacity:.5}
.inc-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,var(--obsidian),transparent 30%,transparent 70%,var(--obsidian))}
.inc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:rgba(197,160,89,.03);max-width:960px;margin:0 auto}
.inc-card{background:var(--obsidian);padding:3rem 2rem;text-align:center;transition:all .5s var(--ease)}
.inc-card:hover{background:var(--surface)}
.inc-icon{margin-bottom:1rem}.inc-icon svg{width:24px;height:24px;stroke:var(--gold);stroke-width:.8;fill:none;opacity:.6}
.inc-icon img{width:60px;height:60px;object-fit:cover;border-radius:50%;filter:contrast(1.1) saturate(.6);border:1px solid rgba(197,160,89,.08)}
.inc-name{font-family:var(--ff-h);font-size:1.05rem;font-weight:500;color:var(--linen);letter-spacing:2px;margin-bottom:.5rem}
.inc-use{font-family:var(--ff-h);font-size:.9rem;font-weight:300;font-style:italic;color:var(--gray)}

/* ═══ PRICING ═══ */
.price-wrap{max-width:960px;margin:0 auto;overflow-x:auto}
.price-tbl{width:100%;border-collapse:collapse}
.price-tbl thead th{font-family:var(--ff-b);font-size:.55rem;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:var(--gold-dim);padding:1.5rem;text-align:left;border-bottom:1px solid rgba(197,160,89,.1)}
.price-tbl tbody tr{border-bottom:1px solid rgba(249,248,245,.03);transition:all .3s}
.price-tbl tbody tr:hover{background:rgba(197,160,89,.03)}
.price-tbl td{padding:1.3rem 1.5rem;font-size:.9rem;color:var(--gray);font-weight:300}
.price-tbl td:first-child{font-family:var(--ff-h);font-size:1rem;font-weight:500;color:var(--linen)}
.price-tbl td:last-child{font-weight:600;font-size:1.1rem;font-family:var(--ff-h)}
.price-tbl .row-icon{display:inline-block;width:16px;height:16px;vertical-align:middle;margin-right:.6rem;stroke:var(--gold-d);stroke-width:.8;fill:none;opacity:.5}
.price-tbl .row-img{display:inline-block;width:28px;height:28px;vertical-align:middle;margin-right:.8rem;border-radius:50%;object-fit:cover;filter:saturate(.5)}

/* ═══ CONTACT ═══ */
.contact-sec{text-align:center}
.wa-btns{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-top:3.5rem}
.wa-btn{display:inline-flex;align-items:center;gap:.8rem;padding:1.1rem 2.8rem;
  background:linear-gradient(135deg,var(--gold-d),var(--gold-l));color:var(--obsidian);
  font-family:var(--ff-b);font-size:.65rem;font-weight:500;letter-spacing:3px;transition:all .4s var(--ease);box-shadow:0 4px 20px rgba(197,160,89,.15)}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(197,160,89,.25)}
.wa-btn svg{width:18px;height:18px;fill:currentColor}
.contact-nums{margin-top:2.5rem;font-family:var(--ff-h);font-size:1rem;font-weight:300;font-style:italic;color:var(--gray)}

/* ═══ PRODUCT DETAIL ═══ */
.pd-back{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--ff-b);font-size:.6rem;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--gray);margin-bottom:3.5rem;transition:color .3s;cursor:pointer}
.pd-back:hover{color:var(--gold)}.pd-back svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.5;fill:none}
.pd-layout{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:start}
.pd-visual{display:flex;align-items:center;justify-content:center;padding:3rem;background:var(--surface);border:1px solid rgba(197,160,89,.04);min-height:420px;overflow:hidden}
.pd-visual svg{width:100px;height:100px;stroke:var(--gold);stroke-width:.6;fill:none;opacity:.6}
.pd-visual img{width:100%;max-width:320px;height:auto;object-fit:cover;filter:contrast(1.1) saturate(.6);border-radius:8px;transition:transform .6s var(--ease)}
.pd-visual:hover img{transform:scale(1.03)}
.pd-info h1{font-family:var(--ff-h);font-size:clamp(1.6rem,3vw,2.4rem);font-weight:400;letter-spacing:3px;margin-bottom:.5rem}
.pd-info .pd-tagline{font-family:var(--ff-h);font-size:1.1rem;font-weight:300;font-style:italic;color:var(--gray);margin-bottom:2.5rem}
.pd-info .pd-desc{font-size:.95rem;font-weight:300;color:var(--gray);line-height:2.1;margin-bottom:2.5rem}
.pd-price-box{border:1px solid rgba(197,160,89,.08);padding:2rem;margin-bottom:2.5rem;background:var(--surface)}
.pd-price-box .pd-price{font-family:var(--ff-h);font-size:2.2rem;font-weight:600}
.pd-price-box .pd-pres{font-size:.8rem;color:var(--gray);margin-top:.3rem;font-weight:300}
.pd-uses{margin-bottom:2.5rem}
.pd-uses h3{font-family:var(--ff-b);font-size:.55rem;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:1.2rem}
.pd-uses ul{display:flex;flex-direction:column;gap:.7rem}
.pd-uses li{font-size:.9rem;color:var(--gray);padding-left:1.5rem;position:relative;font-weight:300}
.pd-uses li::before{content:'';position:absolute;left:0;top:.55rem;width:6px;height:1px;background:var(--gold-d)}
.pd-order-btn{display:inline-flex;align-items:center;gap:.8rem;padding:1.1rem 3rem;background:linear-gradient(135deg,var(--gold-d),var(--gold-l));color:var(--obsidian);font-family:var(--ff-b);font-size:.65rem;font-weight:500;letter-spacing:3px;transition:all .4s var(--ease)}
.pd-order-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(197,160,89,.2)}
.pd-order-btn svg{width:18px;height:18px;fill:currentColor}

/* ═══ FOOTER ═══ */
footer{text-align:center;padding:6rem 2rem 3rem;border-top:1px solid rgba(197,160,89,.06);position:relative;z-index:2}
.footer-deco{font-size:.6rem;letter-spacing:14px;margin-bottom:1.5rem;opacity:.3}
.footer-logo{font-family:var(--ff-h);font-size:1.3rem;font-weight:400;letter-spacing:6px;text-transform:uppercase;margin-bottom:.5rem}
.footer-logo span{color:var(--gold)}
.footer-tagline{font-family:var(--ff-h);font-size:1rem;font-weight:300;font-style:italic;color:var(--gray);margin-bottom:2rem}
.footer-line{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent);margin:0 auto 2rem}
.footer-links{display:flex;gap:1.2rem;justify-content:center;margin-bottom:2rem}
.footer-links a{font-family:var(--ff-b);font-size:.55rem;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--gray2);transition:color .3s}
.footer-links a:hover{color:var(--gold)}.footer-links span{color:rgba(197,160,89,.1)}
.footer-copy{font-size:.7rem;color:var(--gray2);font-weight:300;letter-spacing:1px;opacity:.4}

/* ═══ REVEAL ═══ */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1024px){.pd-layout{grid-template-columns:1fr;gap:3rem}.pd-visual{min-height:280px;padding:3rem}.intro-grid{grid-template-columns:1fr;gap:3rem}}
@media(max-width:768px){
  .nav-links{position:fixed;top:0;right:-100%;width:280px;height:100vh;background:rgba(13,13,13,.97);flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:right .4s var(--ease);backdrop-filter:blur(30px);border-left:1px solid rgba(197,160,89,.05)}
  .nav-links.active{right:0}.hamburger{display:flex}
  .section{padding:5rem 1.5rem}.navbar{padding:1.2rem 1.5rem}.navbar.scrolled{padding:.8rem 1.5rem}
  .inc-grid{grid-template-columns:repeat(2,1fr)}
  .prod-grid{grid-template-columns:1fr;gap:1.5rem;background:transparent}
  .prod-card{border:1px solid rgba(197,160,89,.08);border-radius:16px}
  .ann-band{font-size:.5rem;letter-spacing:2px;padding:.7rem 1rem}
  .inc-banner{aspect-ratio:16/6;border-radius:12px}
  .hero-title{font-size:clamp(3rem, 10vw, 4rem);letter-spacing:2px}
  .price-wrap{margin:0 -1.5rem;padding:0 1.5rem}
}
@media(max-width:480px){
  .inc-grid{grid-template-columns:1fr;gap:1rem}
  .wa-btns{flex-direction:column;align-items:stretch;max-width:320px;margin:3.5rem auto 0}
  .wa-btn{justify-content:center}
  .pd-order-btn{width:100%;justify-content:center}
  .price-tbl td,.price-tbl thead th{padding:.8rem .6rem;font-size:.75rem}
  .hero-scroll{bottom:1.5rem}
}
</style>
</head>
<body>
<canvas id="smoke-canvas"></canvas>
<nav class="navbar" id="navbar">
  <a href="#/" class="nav-logo"><span>PAZ </span><span>INTERIOR</span></a>
  <div class="nav-links" id="navLinks">
    <a href="#/" onclick="closeMenu()">Inicio</a>
    <a href="#productos" onclick="closeMenu()">Catálogo</a>
    <a href="#inciensos" onclick="closeMenu()">Inciensos</a>
    <a href="#precios" onclick="closeMenu()">Precios</a>
    <a href="#contacto" onclick="closeMenu()">Contacto</a>
  </div>
  <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</nav>
<div id="app"></div>

window.addEventListener('resize',rz);rz();
class SmokeP{
  constructor(origin){this.origin=origin;this.reset()}
  reset(){
    if(this.origin==='bottom'){this.x=Math.random()*W;this.y=H+Math.random()*80}
    else if(this.origin==='left'){this.x=-50;this.y=Math.random()*H}
    else{this.x=W+50;this.y=Math.random()*H}
    this.r=Math.random()*80+40;this.vx=(Math.random()-.5)*.2;
    this.vy=this.origin==='bottom'?-(Math.random()*.3+.1):(Math.random()-.5)*.15;
    this.life=0;this.max=Math.random()*400+250;this.op=Math.random()*.06+.02;
    this.drift=Math.random()*Math.PI*2;this.driftS=Math.random()*.003+.001}
  update(sOff){
    this.drift+=this.driftS;
    this.x+=this.vx+Math.sin(this.drift)*.4;
    this.y+=this.vy-(sOff*.008);
    this.r+=.06;this.life++;
    if(this.life>this.max||this.y<-120||this.x<-150||this.x>W+150)this.reset()}
  draw(){
    const f=this.life/this.max;const a=this.op*Math.sin(f*Math.PI);
    if(a<=.001)return;
    const g=cx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,`rgba(240,238,232,${a})`);g.addColorStop(.5,`rgba(220,215,205,${a*.5})`);g.addColorStop(1,'rgba(200,195,185,0)');
    cx.beginPath();cx.arc(this.x,this.y,this.r,0,Math.PI*2);cx.fillStyle=g;cx.fill()}
}
const smokes=[];
for(let i=0;i<30;i++)smokes.push(new SmokeP('bottom'));
for(let i=0;i<8;i++)smokes.push(new SmokeP('left'));
for(let i=0;i<8;i++)smokes.push(new SmokeP('right'));
smokes.forEach(s=>{s.life=Math.random()*250});
function renderSmoke(){cx.clearRect(0,0,W,H);const d=sY-tY;tY+=(sY-tY)*.03;smokes.forEach(s=>{s.update(d);s.draw()});requestAnimationFrame(renderSmoke)}
